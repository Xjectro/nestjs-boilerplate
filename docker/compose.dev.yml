services:
  api:
    build:
      context: ..
      dockerfile: docker/images/api/Dockerfile.dev
    command: ['sh', '-c', 'npm install && npm run start:dev']
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/turtles
      REDIS_URL: redis://redis:6379
      SEQ_SERVER_URL: http://seq:5341
      SEQ_API_KEY: ''
    ports:
      - '3000:3000'
    volumes:
      - ..:/usr/src/app
      - dev_node_modules:/usr/src/app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    restart: unless-stopped

volumes:
  dev_node_modules:
