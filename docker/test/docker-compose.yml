services:
  tests:
    build:
      context: ../..
      dockerfile: docker/test/Dockerfile
    environment:
      NODE_ENV: test
      MONGODB_URI: mongodb://mongodb:27017/turtles
      REDIS_URL: redis://redis:6379
      SEQ_SERVER_URL: http://seq:5341
      SEQ_API_KEY: ''
      E2E_USE_MEMORY_SERVER: 'false'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    command: sh -c "npm run test && npm run test:e2e"

  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: turtles
    ports:
      - '27017:27017'
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--quiet',
          'mongodb://localhost:27017/turtles',
          '--eval',
          'db.runCommand({ ping: 1 })',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:2024.2
    restart: unless-stopped
    environment:
      ACCEPT_EULA: 'Y'
    ports:
      - '8081:80'
      - '5341:5341'

  redis:
    image: redis:7.4
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
