services:
  mongodb:
    command: ['--dbpath', '/tmp/mongodb-test']
    tmpfs:
      - /tmp/mongodb-test
  tests:
    build:
      context: ..
      dockerfile: docker/images/api/Dockerfile.test
    environment:
      NODE_ENV: test
      MONGODB_URI: mongodb://mongodb:27017/turtles
      REDIS_URL: redis://redis:6379
      SEQ_SERVER_URL: http://seq:5341
      SEQ_API_KEY: ''
      E2E_USE_MEMORY_SERVER: 'false'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    command: ['sh', '-c', 'npm run test && npm run test:e2e']
