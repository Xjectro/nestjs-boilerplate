services:
  # MongoDB disabled - using remote MongoDB Atlas
  mongodb:
    profiles:
      - disabled

  # MongoDB exporter disabled - not needed without local MongoDB
  mongodb-exporter:
    profiles:
      - disabled

  # Prometheus depends on Redis exporter, but since we're using a remote MongoDB, we can skip the MongoDB exporter dependency
  prometheus:
    depends_on: !override
      redis-exporter:
        condition: service_started

  api:
    image: nestjs-boilerplate:prod
    build:
      context: ..
      dockerfile: docker/images/api/Dockerfile.prod
    command: ['sh', '-c', 'npm install && npm run start:prod']
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/turtles
      REDIS_URL: redis://redis:6379
      SEQ_SERVER_URL: http://seq:5341
      SEQ_API_KEY: ''
    depends_on:
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    restart: unless-stopped
